<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<nav class="navbar bg-base-100 border-b border-zinc-700 shadow-sm px-4" th:fragment="navbar">
  <div class="navbar-start">
    <a th:href="@{/}" class="font-medium tracking-tight">
      Spring Demo
    </a>
  </div>

  <div class="navbar-end gap-2">
    <th:block th:if="${currentUser != null}">
      <div class="dropdown dropdown-end">
        <div
          tabindex="0"
          role="button"
          class="btn btn-ghost h-8 px-3 hover:bg-zinc-800 active:bg-zinc-800 focus:bg-zinc-800">

          <div class="text-right">
            <div
              class="text-xs font-normal opacity-70"
              th:text="${currentUser.email}">
              john@example.com
            </div>

          </div>

        </div>

        <ul
          tabindex="0"
          class="dropdown-content mt-1 menu bg-zinc-800 rounded-[12px] z-10 w-42 p-2 shadow">
          <li>
            <a th:href="@{/profile}">
              Profile
            </a>
          </li>
          <li>
            <a th:href="@{/settings}">
              Settings
            </a>
          </li>
          <li>
            <form
              th:action="@{/auth/logout}"
              method="post">
              <button
                type="submit"
                class="w-full text-left">
                Logout
              </button>

            </form>
          </li>

        </ul>

      </div>

    </th:block>

    <th:block th:unless="${currentUser != null}">
      <a
        th:href="@{/auth/login}"
        class="btn btn-primary btn-sm leading-none font-medium text-sm"
      >
        Login
      </a>
    </th:block>

  </div>
</nav>

</html>
